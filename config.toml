# RustDB Configuration

name = "rustdb"
data_directory = "./data"
max_connections = 100
connection_timeout = 30
query_timeout = 60
language = "en"  # Supported languages: "en"

# QUIC listener (`rustdb server`). CLI `--host` / `--port` override these when set.
[network]
host = "127.0.0.1"
port = 5432
max_connections = 100
