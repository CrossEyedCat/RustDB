name: CI/CD Pipeline

# Skip the whole pipeline when only non-code paths change (saves minutes on docs/README edits).
# If a commit touches any path NOT listed here, the workflow runs as usual.
# Note: do not list `.gitignore` here — a commit that only edits `.gitignore` must still trigger CI,
# otherwise pushes look like “CI stopped working” with no failed run (workflow skipped entirely).
# Docs-only PRs: when every changed file matches paths-ignore below, GitHub does not start this workflow.
# To run CI on documentation PRs (e.g. TPC-C validation checklists), touch this file or another non-ignored path.
# bench_tpcc_throughput on PR: head ref tpcc* or docs/tpcc* (see job if:).
on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
      - "LICENSE-*"
      - "architecture.puml"
      - ".editorconfig"
  # No `branches` filter: stacked PRs (base = feature branch) must still run CI.
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
      - "LICENSE-*"
      - "architecture.puml"
      - ".editorconfig"
  workflow_dispatch:
    inputs:
      profile_concurrency:
        description: "Concurrency for trace profile and Flame Graph (rustdb_load)"
        required: false
        default: "128"
      profile_queries:
        description: "Total queries for trace profile and Flame Graph (rustdb_load)"
        required: false
        default: "20000"
      loom_max_preemptions:
        description: "Loom LOOM_MAX_PREEMPTIONS for permutation tests (see tokio-rs/loom)"
        required: false
        default: "4"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Tests run on Linux only (RustDB is not supported on Windows/macOS).
  test:
    name: Test Suite (${{ matrix.os }}, ${{ matrix.rust }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            features: ""
          - os: ubuntu-latest
            rust: beta
            features: ""
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      # Full run (lib + integration + doctests) on cold cache and beta may exceed 10 minutes.
      - name: Run tests
        # crash_matrix_tests share process env; WAL teardown must finish before the next test.
        run: cargo test --verbose ${{ matrix.features }} -- --test-threads=1
        timeout-minutes: 25

      - name: Run integration tests
        run: cargo test --test integration_tests --verbose ${{ matrix.features }}
        timeout-minutes: 15

      - name: Run doc tests
        run: cargo test --doc --verbose ${{ matrix.features }}
        timeout-minutes: 10

      - name: Install cargo-audit
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        run: cargo install cargo-audit

      - name: Run cargo audit
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        run: cargo audit

      - name: Run cargo-deny
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # Coverage: cargo-llvm-cov → lcov.info → Codecov (see codecov.yml at repository root).
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      # Ignore coverage for large internal modules plus CLI/binaries (they're exercised via e2e smoke, not unit tests).
      COV_REGEX: '(executor[/\\]operators|analyzer[/\\]semantic_analyzer|analyzer[/\\]access_checker|analyzer[/\\]type_checker|analyzer[/\\]metadata_cache|core[/\\]recovery_manager|core[/\\]acid_manager|core[/\\]buffer|core[/\\]transaction|core[/\\]advanced_lock_manager|core[/\\]recovery\.rs|storage[/\\]page_manager|storage[/\\]schema_manager|storage[/\\]index[/\\]btree|storage[/\\]io_optimization|storage[/\\]block|storage[/\\]row|storage[/\\]tuple|storage[/\\]page\.rs|planner[/\\]planner|logging[/\\]compaction|logging[/\\]recovery|parser[/\\]parser)\.rs$|[/\\]src[/\\](cli|main)\.rs$|(^|[/\\])bin[/\\].*\.rs$|[/\\]network[/\\]sql_commit_log\.rs$|[/\\]network[/\\]sql_engine_wal\.rs$|[/\\]network[/\\]sql_engine[/\\][^/\\]+\.rs$|[/\\]sql_session\.rs$|[/\\]catalog[/\\]schema\.rs$'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rust stable + llvm-tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Generate LCOV first (without --fail-under-lines); otherwise Codecov upload is skipped if the threshold fails.
      - name: cargo llvm-cov (tests + lcov.info)
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex "$COV_REGEX"
          test -s lcov.info
          wc -l lcov.info

      # Only lcov.info; disable_search avoids the CLI picking up *_coverage_tests.rs via *coverage*.
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          disable_search: true
          fail_ci_if_error: true
          verbose: true

      - name: Enforce ≥85% lines (local threshold)
        run: |
          cargo llvm-cov report --fail-under-lines 85 \
            --ignore-filename-regex "$COV_REGEX"

  # After tests: code quality and MSRV (in parallel), then release build.
  format:
    name: Format Check
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Check
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust 1.90.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check MSRV
        run: cargo check

  # Checking the build in release mode
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [format, clippy, msrv, coverage]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release
        run: cargo build --release --verbose

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdb-linux-x64
          path: target/release/rustdb

  # Alongside the release build: same prerequisites (format, clippy, msrv), in parallel.
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [format, clippy, msrv, coverage]
    outputs:
      image: ${{ steps.set_image.outputs.image }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: ./.github/actions/ghcr-login
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            # Short digest tag (valid even when `branch` is empty on some PR/fork flows; avoid `prefix={{branch}}-` → leading `-`).
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Choose image tag for downstream jobs
        id: set_image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # docker/metadata-action does not emit `${ref}-${full_40_char_sha}` by default; `type=sha`
          # yields `sha-<short>`. Match that first, then legacy `ref-fullsha` if ever present.
          repo="ghcr.io/${{ github.repository }}"
          short_sha=$(printf '%s' "$SHA" | cut -c1-7)
          preferred_digest="${repo}:sha-${short_sha}"
          preferred_ref_fullsha="${repo}:${REF_NAME}-${SHA}"
          image=""
          if echo "$TAGS" | tr -d '\r' | grep -Fxq "$preferred_digest"; then
            image="$preferred_digest"
          elif echo "$TAGS" | tr -d '\r' | grep -Fxq "$preferred_ref_fullsha"; then
            image="$preferred_ref_fullsha"
          else
            # PR pipelines: prefer stable `pr-<n>` if metadata produced it.
            image=$(echo "$TAGS" | tr -d '\r' | grep -E ":pr-[0-9]+\$" | head -n1 || true)
            if [ -z "${image:-}" ]; then
              image="$(echo "$TAGS" | head -n1 | tr -d '\r')"
            fi
          fi
          test -n "$image"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "Selected image: $image"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Pull the image just pushed by `docker` and run scripts/sql_stateful_smoke.sh (persistent volume SQL checks).
  docker_stateful_sql:
    name: Docker stateful SQL smoke
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: ./.github/actions/ghcr-login
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          set -euo pipefail
          test -n "$IMAGE"
          echo "RUSTDB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE"

      - name: Run stateful SQL smoke
        run: |
          set -euo pipefail
          chmod +x scripts/sql_stateful_smoke.sh
          ./scripts/sql_stateful_smoke.sh
        timeout-minutes: 15

  # QUIC smoke: run server from the just-built image and send queries over QUIC from host client.
  docker_quic_sql:
    name: Docker QUIC SQL smoke
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust (client)
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Login to GHCR
        uses: ./.github/actions/ghcr-login
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          set -euo pipefail
          test -n "$IMAGE"
          echo "RUSTDB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE"

      - name: Run QUIC SQL smoke
        run: |
          set -euo pipefail
          chmod +x scripts/sql_quic_smoke.sh
          ./scripts/sql_quic_smoke.sh
        timeout-minutes: 15

  # NOTE: bench_sqlite_vs_rustdb job removed (cross-engine charts were not actionable / too flaky for CI).

  # Loom permutation tests for concurrent SqlEngine scenarios (see README + tokio-rs/loom).
  # Replaces the former RustDB vs Postgres throughput saturation benchmark job.
  test_loom_sql_engine:
    name: Loom (concurrent SQL engine)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps (TLS / native deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Run Loom permutation tests
        env:
          RUSTFLAGS: --cfg rustdb_loom
          LOOM_MAX_PREEMPTIONS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.loom_max_preemptions || '4' }}
        run: |
          set -euo pipefail
          mkdir -p loom-out
          cargo test --release --verbose \
            engine_concurrent_inserts_only_one_wins_same_pk \
            2>&1 | tee -a loom-out/loom-tests.log
          cargo test --release --verbose \
            engine_alter_fk_many_inserts_under_contention \
            2>&1 | tee -a loom-out/loom-tests.log

      - name: Upload Loom test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loom-sql-engine-tests
          path: loom-out/loom-tests.log

  # Final throughput benchmark: TPC-C-ish (transactional write-heavy mix) for RustDB over QUIC.
  # Runs on: main push, workflow_dispatch, and pull_request when head branch is tpcc* (perf PRs).
  # Other PRs: use Actions → workflow_dispatch on the PR branch, or merge to main.
  # Run 20/22 policy: keep full-mix soft floor at 58% until two consecutive CI runs reach ≥56%;
  # do not raise the floor early. order_status micro stays at 70%.
  # Run 22 stretch (informational): new_order commit_us p50 <70ms, commit_flush_us p50 <55ms on two main runs.
  bench_tpcc_throughput:
    name: Benchmark TPC-C throughput (RustDB) + postgres_tpcc baseline (PostgreSQL)
    runs-on: ubuntu-latest
    needs: [docker]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && (
        startsWith(github.head_ref, 'tpcc') ||
        startsWith(github.head_ref, 'opt/') ||
        startsWith(github.head_ref, 'docs/tpcc')
      ))
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    # Throughput: defer per-DML heap flush when WAL is on (scripts/tpcc_throughput_ci.sh → docker).
    # Explicit COMMIT still appends/fsyncs commits.log per durability (orthogonal to defer).
    # COMMIT heap flush writes pages but skips per-table fsync (WAL + commits.log for the job).
    env:
      RUSTDB_DEFER_HEAP_FLUSH_AFTER_DML: "1"
      RUSTDB_BENCH_DEFER_HEAP_FSYNC: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust (load generator)
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Login to GHCR
        uses: ./.github/actions/ghcr-login
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          set -euo pipefail
          test -n "$IMAGE"
          echo "RUSTDB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE"

      - name: PostgreSQL baseline (postgres_tpcc, docker)
        env:
          OUT_DIR: tpcc-out
          POSTGRES_CONTAINER_NAME: postgres-tpcc-bench
          POSTGRES_HOST_PORT: 15440
          POSTGRES_DB: tpcc_bench
          POSTGRES_TPCC_KEEP_CONTAINER: "1"
          CONCURRENCY: 64
          DURATION_SECS: 300
          MIX: new_order=0.45,payment=0.43,order_status=0.04,delivery=0.04,stock_level=0.04
        run: |
          set -euo pipefail
          chmod +x scripts/bench_postgres_tpcc.sh
          ./scripts/bench_postgres_tpcc.sh
          pg_tps="$(python3 -c 'import json,pathlib; p=pathlib.Path("tpcc-out/postgres_tpcc.json"); print(json.loads(p.read_text(encoding="utf-8")).get("txns_per_s", 0.0) if p.is_file() else 0.0)')"
          echo "POSTGRES_TPCC_TXNS_PER_S=$pg_tps" >> "$GITHUB_ENV"
          echo "POSTGRES_TPCC_CONTAINER=${POSTGRES_CONTAINER_NAME:-postgres-tpcc-bench}" >> "$GITHUB_ENV"

      - name: Run TPC-C throughput benchmark
        env:
          OUT_DIR: tpcc-out
          # Saturation run (duration-based).
          CONCURRENCY: 64
          DURATION_SECS: 300
          MIX: new_order=0.45,payment=0.43,order_status=0.04,delivery=0.04,stock_level=0.04
          RUSTDB_TPCC_NATIVE: "1"
          RUSTDB_TPCC_NATIVE_MICRO: "1"
          # Default 24 workers on push; workflow_dispatch A/B: override RUSTDB_SQL_WORKER_COUNT=32
          # on 4+ vCPU runners (edit env below or set in the manual run inputs).
          RUSTDB_SQL_WORKER_COUNT: "24"
        run: |
          set -euo pipefail
          chmod +x scripts/tpcc_throughput_ci.sh
          ./scripts/tpcc_throughput_ci.sh

      - name: Microbench order_status only (index A/B, 60s)
        env:
          OUT_DIR: tpcc-out/order_status_micro
          CONCURRENCY: 64
          DURATION_SECS: 60
          MIX: order_status=1.0
          POSTGRES_HOST_PORT: 15441
          UDP_PORT: 15433
          CONTAINER_NAME: rustdb-tpcc-os-micro
          VOL_NAME: rustdb_tpcc_os_micro_data
          POSTGRES_CONTAINER_NAME: postgres-tpcc-os-micro
        run: |
          set -euo pipefail
          mkdir -p tpcc-out/order_status_micro
          chmod +x scripts/tpcc_order_status_microbench.sh
          ./scripts/tpcc_order_status_microbench.sh | tee tpcc-out/order_status_micro/summary.txt

      - name: Add benchmark summary (RustDB vs PostgreSQL)
        if: always()
        run: |
          set -euo pipefail
          # RustDB: read txns_per_s from tpcc.json (machine-readable).
          rustdb_tps="$(python3 -c 'import json,pathlib; p=pathlib.Path("tpcc-out/tpcc.json"); print(json.loads(p.read_text(encoding="utf-8")).get("txns_per_s", 0.0) if p.is_file() else 0.0)')"
          rustdb_sr="$(python3 -c 'import json,pathlib; p=pathlib.Path("tpcc-out/tpcc.json"); print(json.loads(p.read_text(encoding="utf-8")).get("success_rate_pct", 0.0) if p.is_file() else 0.0)')"
          pg_tps="${POSTGRES_TPCC_TXNS_PER_S:-0.0}"
          ratio="$(python3 -c "rd=float('$rustdb_tps'); pg=float('$pg_tps'); print(f'{(100.0*rd/pg):.1f}' if pg>0 else '0.0')")"
          {
            echo "## RustDB vs PostgreSQL (baseline)"
            echo ""
            echo "- RustDB: **rustdb_tpcc** (TPC-C-ish over QUIC)"
            echo "- PostgreSQL: **postgres_tpcc** (same SQL mix as rustdb_tpcc, over TCP)"
            echo ""
            echo "### RustDB (rustdb_tpcc)"
            echo '```'
            if [[ -s "tpcc-out/tpcc.txt" ]]; then
              cat tpcc-out/tpcc.txt
            else
              echo "(missing tpcc-out/tpcc.txt)"
            fi
            echo '```'
            echo ""
            echo "### PostgreSQL (postgres_tpcc)"
            echo '```'
            if [[ -s "tpcc-out/postgres_tpcc.txt" ]]; then
              cat tpcc-out/postgres_tpcc.txt
            else
              echo "(missing tpcc-out/postgres_tpcc.txt)"
            fi
            echo '```'
            echo ""
            echo "### Ratio"
            echo ""
            echo "- rustdb_tpcc txns_per_s (successful only): **${rustdb_tps}**"
            echo "- rustdb_tpcc success_rate_pct: **${rustdb_sr}%**"
            echo "- postgres_tpcc txns_per_s (successful only): **${pg_tps}**"
            echo "- rustdb / postgres: **${ratio}%**"
            echo ""
            echo "### Full mix txn latency by kind"
            echo ""
            echo '```'
            if [[ -s "tpcc-out/tpcc_txn.log" ]]; then
              echo "--- RustDB (rustdb_tpcc) ---"
              python3 scripts/analyze_tpcc_txn_log.py tpcc-out/tpcc_txn.log || true
            else
              echo "(missing tpcc-out/tpcc_txn.log)"
            fi
            if [[ -s "tpcc-out/postgres_tpcc_txn.log" ]]; then
              echo ""
              echo "--- PostgreSQL (postgres_tpcc) ---"
              python3 scripts/analyze_tpcc_txn_log.py tpcc-out/postgres_tpcc_txn.log || true
            else
              echo "(missing tpcc-out/postgres_tpcc_txn.log)"
            fi
            echo '```'
            echo ""
            echo "### RustDB server log (sql phase summary)"
            echo ""
            echo "Full QUIC server stdout+stderr is in artifact **\`tpcc-out/server_full.log\`** (also \`server_tail.log\` = last 400 lines)."
            echo ""
            echo '```'
            if [[ -s "tpcc-out/server_full.log" ]]; then
              echo "--- SQL phase summary (parse / locks / commit / execute_script) ---"
              python3 scripts/summarize_sql_phase_log.py --warn-lock-p99-ms 50 --warn-flush-p99-ms 100 --warn-district-row-lock-pct 90 tpcc-out/server_full.log || echo "(summarize_sql_phase_log.py failed or no matching lines)"
              echo ""
              echo "--- COMMIT samples (flush_us / wal_us) ---"
              grep -E 'rustdb::sql_phases: sql\.commit.*flush_us=' tpcc-out/server_full.log 2>/dev/null | tail -n 5 \
                || grep -E 'sql\.commit.*flush_us=' tpcc-out/server_full.log 2>/dev/null | tail -n 5 \
                || echo "(no sql.commit lines in log)"
            else
              echo "(missing tpcc-out/server_full.log)"
            fi
            echo '```'
            echo ""
            echo "### order_status microbench (60s, mix=order_status only)"
            echo ""
            echo "Isolates \`idx_oorder_wdc\` vs full-mix noise; fresh DB per leg. Artifacts: \`tpcc-out/order_status_micro/\`."
            echo ""
            echo '```'
            if [[ -s "tpcc-out/order_status_micro/summary.txt" ]]; then
              cat tpcc-out/order_status_micro/summary.txt
            else
              echo "(missing tpcc-out/order_status_micro/summary.txt)"
            fi
            if [[ -s "tpcc-out/order_status_micro/tpcc_txn.log" ]]; then
              echo ""
              echo "--- RustDB txn log (order_status only) ---"
              python3 scripts/analyze_tpcc_txn_log.py tpcc-out/order_status_micro/tpcc_txn.log || true
              echo ""
              echo "--- PostgreSQL txn log (order_status only) ---"
              python3 scripts/analyze_tpcc_txn_log.py tpcc-out/order_status_micro/postgres_tpcc_txn.log || true
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Soft throughput thresholds (informational; do not fail the job).
          micro_rd="$(python3 -c 'import json,pathlib; p=pathlib.Path("tpcc-out/order_status_micro/tpcc.json"); print(json.loads(p.read_text(encoding="utf-8")).get("txns_per_s", 0.0) if p.is_file() else 0.0)')"
          micro_pg="$(python3 -c 'import json,pathlib; p=pathlib.Path("tpcc-out/order_status_micro/postgres_tpcc.json"); print(json.loads(p.read_text(encoding="utf-8")).get("txns_per_s", 0.0) if p.is_file() else 0.0)')"
          micro_ratio="$(python3 -c "rd=float('$micro_rd'); pg=float('$micro_pg'); print(f'{(100.0*rd/pg):.1f}' if pg>0 else '0.0')")"
          {
            echo ""
            echo "### Throughput thresholds (informational)"
            echo ""
            echo "- Full mix rustdb/postgres: **${ratio}%** (soft floor: 58%; target ≥56% before raising floor)"
            echo "- order_status micro rustdb/postgres: **${micro_ratio}%** (soft floor: 70%)"
          } >> "$GITHUB_STEP_SUMMARY"
          if python3 -c "exit(0 if float('${ratio}') >= 58.0 else 1)"; then
            :
          else
            echo "::warning::Full mix RustDB/PostgreSQL TPS ratio ${ratio}% is below the 58% soft threshold"
          fi
          if python3 -c "exit(0 if float('${ratio}') >= 56.0 else 1)"; then
            :
          else
            echo "::warning::Full mix RustDB/PostgreSQL TPS ratio ${ratio}% is below the 56% run-20 stabilization target"
          fi
          if python3 -c "exit(0 if float('${micro_ratio}') >= 70.0 else 1)"; then
            :
          else
            echo "::warning::order_status micro RustDB/PostgreSQL TPS ratio ${micro_ratio}% is below the 70% soft threshold"
          fi
          new_order_p50="$(python3 -c "import csv,statistics; from pathlib import Path; p=Path('tpcc-out/tpcc_txn.log'); rows=[] if not p.is_file() else [r for r in csv.DictReader(p.read_text().splitlines()) if r.get('ok','').lower() in ('true','1') and r.get('kind')=='new_order']; us=[int(r['elapsed_us']) for r in rows if r.get('elapsed_us','').isdigit()]; print(f'{statistics.median(us)/1000:.3f}' if us else '0')" 2>/dev/null || echo 0)"
          if python3 -c "exit(0 if float('${new_order_p50}') <= 110.0 or float('${new_order_p50}') <= 0 else 1)"; then
            :
          else
            echo "::warning::new_order full-mix p50 ${new_order_p50}ms exceeds 110ms soft threshold"
          fi
          new_order_commit_p50="$(python3 -c "import re,statistics; from pathlib import Path; p=Path('tpcc-out/server_full.log'); us=[]; [us.append(int(m.group(1))) for line in (p.read_text(encoding='utf-8',errors='replace').splitlines() if p.is_file() else []) if 'sql.execute_tpcc.commit' in line and 'tpcc_kind=0' in line for m in [re.search(r'commit_us=(\d+)', line)] if m]; print(f'{statistics.median(us)/1000:.3f}' if us else '0')" 2>/dev/null || echo 0)"
          if python3 -c "exit(0 if float('${new_order_commit_p50}') <= 50.0 or float('${new_order_commit_p50}') <= 0 else 1)"; then
            :
          else
            echo "::warning::new_order server commit_us p50 ${new_order_commit_p50}ms exceeds 50ms informational threshold"
          fi
          if python3 -c "exit(0 if float('${new_order_commit_p50}') <= 70.0 or float('${new_order_commit_p50}') <= 0 else 1)"; then
            :
          else
            echo "::warning::new_order server commit_us p50 ${new_order_commit_p50}ms exceeds 70ms run-22 stretch target"
          fi
          new_order_commit_flush_p50="$(python3 -c "import re,statistics; from pathlib import Path; p=Path('tpcc-out/server_full.log'); us=[]; [us.append(int(m.group(1))) for line in (p.read_text(encoding='utf-8',errors='replace').splitlines() if p.is_file() else []) if 'sql.commit' in line and 'tpcc_kind=0' in line for m in [re.search(r'commit_flush_us=(\d+)', line)] if m]; print(f'{statistics.median(us)/1000:.3f}' if us else '0')" 2>/dev/null || echo 0)"
          if python3 -c "exit(0 if float('${new_order_commit_flush_p50}') <= 55.0 or float('${new_order_commit_flush_p50}') <= 0 else 1)"; then
            :
          else
            echo "::warning::new_order sql.commit commit_flush_us p50 ${new_order_commit_flush_p50}ms exceeds 55ms run-22 stretch target"
          fi
          mix_os_p50="$(python3 -c "import csv,statistics; from pathlib import Path; p=Path('tpcc-out/tpcc_txn.log'); rows=[] if not p.is_file() else [r for r in csv.DictReader(p.read_text().splitlines()) if r.get('ok','').lower() in ('true','1') and r.get('kind')=='order_status']; us=[int(r['elapsed_us']) for r in rows if r.get('elapsed_us','').isdigit()]; print(f'{statistics.median(us)/1000:.3f}' if us else '0')" 2>/dev/null || echo 0)"
          micro_os_p50="$(python3 -c "import csv,statistics; from pathlib import Path; p=Path('tpcc-out/order_status_micro/tpcc_txn.log'); rows=[] if not p.is_file() else [r for r in csv.DictReader(p.read_text().splitlines()) if r.get('ok','').lower() in ('true','1') and r.get('kind')=='order_status']; us=[int(r['elapsed_us']) for r in rows if r.get('elapsed_us','').isdigit()]; print(f'{statistics.median(us)/1000:.3f}' if us else '0')" 2>/dev/null || echo 0)"
          if python3 -c "mix=float('${mix_os_p50}'); micro=float('${micro_os_p50}'); exit(0 if mix<=0 or micro<=0 or (mix/micro)<=3.0 else 1)"; then
            :
          else
            echo "::warning::order_status full-mix p50 ${mix_os_p50}ms is more than 3× micro p50 ${micro_os_p50}ms (queue tail)"
          fi

      - name: Validate TPC-C run (bench mode)
        if: always()
        run: |
          set -euo pipefail
          if [[ ! -d tpcc-out ]]; then
            echo "::warning::tpcc-out missing; skip validation"
            exit 0
          fi
          set +e
          python3 scripts/validate_tpcc_run.py --mode bench tpcc-out
          val_rc=$?
          set -e
          if [[ "$val_rc" -ne 0 ]]; then
            echo "::warning::TPC-C bench validation failed (exit $val_rc); see validation.json"
          fi
          if [[ -f tpcc-out/validation.json ]]; then
            python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          v = json.loads(Path("tpcc-out/validation.json").read_text(encoding="utf-8"))
          m = v.get("metrics", {})
          print("")
          print("### TPC-C validation (bench mode)")
          print("")
          print(f"- **valid**: {v.get('valid')}")
          if v.get("reasons"):
              print("- **reasons**:")
              for r in v["reasons"]:
                  print(f"  - {r}")
          print(f"- postgres txns/s: **{m.get('postgres_txns_per_s', 'n/a')}**")
          print(f"- PG payment p95 (ms): **{m.get('pg_payment_p95_ms', 'n/a')}**")
          ratio = m.get("ratio_percent_rustdb_over_postgres")
          if v.get("valid") and ratio is not None:
              print(f"- rustdb/postgres ratio: **{ratio:.1f}%** (informational; bench defer profile)")
          elif ratio is not None:
              print(f"- rustdb/postgres ratio: {ratio:.1f}% *(not advertised — validation failed)*")
          else:
              print("- rustdb/postgres ratio: *(unavailable)*")
          if not v.get("valid"):
              print("")
              print("> Do not treat ratio as «RustDB faster than PostgreSQL» when valid=false.")
          PY
          fi

      - name: Upload TPC-C artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rustdb-tpcc-throughput
          path: |
            tpcc-out/tpcc.json
            tpcc-out/tpcc.txt
            tpcc-out/tpcc_txn.log
            tpcc-out/postgres_tpcc.json
            tpcc-out/postgres_tpcc.txt
            tpcc-out/postgres_tpcc_txn.log
            tpcc-out/server.der
            tpcc-out/server_full.log
            tpcc-out/server_tail.log
            tpcc-out/order_status_micro/tpcc.json
            tpcc-out/order_status_micro/tpcc.txt
            tpcc-out/order_status_micro/tpcc_txn.log
            tpcc-out/order_status_micro/postgres_tpcc.json
            tpcc-out/order_status_micro/postgres_tpcc.txt
            tpcc-out/order_status_micro/postgres_tpcc_txn.log
            tpcc-out/order_status_micro/server_full.log
            tpcc-out/order_status_micro/summary.txt
            tpcc-out/validation.json
      - name: Stop PostgreSQL (docker)
        if: always()
        run: |
          docker rm -f "${POSTGRES_TPCC_CONTAINER:-postgres-tpcc-bench}" >/dev/null 2>&1 || true
          docker rm -f postgres-tpcc-os-micro >/dev/null 2>&1 || true
          docker rm -f rustdb-tpcc-os-micro >/dev/null 2>&1 || true

  profile_quic_select_table:
    name: Trace profile (QUIC select_table @128)
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Login to GHCR
        uses: ./.github/actions/ghcr-login
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          set -euo pipefail
          test -n "$IMAGE"
          echo "RUSTDB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE"

      - name: Run trace profiling script
        env:
          CONCURRENCY: ${{ inputs.profile_concurrency }}
          QUERIES: ${{ inputs.profile_queries }}
          OUT_DIR: profile-out
        run: |
          set -euo pipefail
          chmod +x scripts/profile_quic_select_table_trace_ci.sh
          ./scripts/profile_quic_select_table_trace_ci.sh
        timeout-minutes: 20

      - name: Upload profiling artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trace-profile-quic-select-table
          path: |
            profile-out/load.jsonl
            profile-out/server.der
            profile-out/trace.json

  flame_graph:
    name: Flame Graph (rustdb_load)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install perf (Linux)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y linux-tools-common linux-tools-generic
          KERNEL="$(uname -r)"
          if ! command -v perf >/dev/null 2>&1; then
            if [[ -x "/usr/lib/linux-tools/${KERNEL}/perf" ]]; then
              sudo ln -sf "/usr/lib/linux-tools/${KERNEL}/perf" /usr/local/bin/perf
            fi
          fi
          perf --version

      - name: Allow perf for runner user
        run: |
          set -euo pipefail
          echo -1 | sudo tee /proc/sys/kernel/perf_event_paranoid

      - name: Install cargo-flamegraph
        run: cargo install flamegraph

      - name: Generate flame graph (local server + rustdb_load)
        env:
          CARGO_PROFILE_RELEASE_DEBUG: "true"
          CONCURRENCY: ${{ github.event.inputs.profile_concurrency }}
          QUERIES: ${{ github.event.inputs.profile_queries }}
        run: |
          set -euo pipefail
          export CONCURRENCY="${CONCURRENCY:-128}"
          export QUERIES="${QUERIES:-20000}"
          chmod +x scripts/flamegraph_selfcontained.sh
          ./scripts/flamegraph_selfcontained.sh
        timeout-minutes: 25

      - name: Upload flame graph
        uses: actions/upload-artifact@v4
        with:
          name: flamegraph-rustdb-load
          path: |
            profile-out/flame_rustdb_load_select1.svg

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [format, clippy, msrv, coverage]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check documentation
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Deploy documentation to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          destination_dir: docs

  # Deploy to GitHub Releases (coverage and security run in the test job on ubuntu + stable).
  deploy:
    name: Deploy to GitHub Releases
    runs-on: ubuntu-latest
    needs: [build, docker, docker_stateful_sql, docker_quic_sql]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          tar -czf /tmp/source.tar.gz --exclude=target --exclude=.git .
          mv /tmp/source.tar.gz rustdb-main-${{ github.sha }}-source.tar.gz

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: rustdb-linux-x64
          path: linux

      - name: Create release archives
        run: |
          set -e
          mkdir -p release
          LINUX_BIN=$(find linux -name rustdb -type f 2>/dev/null | head -1)
          cp "$LINUX_BIN" release/rustdb
          tar -czf rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz -C release rustdb

      - name: Verify artifacts
        run: |
          test -f rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
          test -f rustdb-main-${{ github.sha }}-source.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: main-${{ github.sha }}
          name: Build from main (${{ github.sha }})
          fail_on_unmatched_files: false
          body: |
            ## Artifacts
            - **Linux x86_64**: rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
            - **Source**: rustdb-main-${{ github.sha }}-source.tar.gz
            ## Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}:latest
            ```
          files: |
            rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
            rustdb-main-${{ github.sha }}-source.tar.gz
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Notifications
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Notify on success
        if: needs.deploy.result == 'success'
        run: echo "Deployment successful!"

      - name: Notify on failure
        if: needs.deploy.result == 'failure'
        run: echo "Deployment failed!"
