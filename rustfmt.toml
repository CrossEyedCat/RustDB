# rustfmt configuration (stable options only)
# See: https://rust-lang.github.io/rustfmt/

# General settings
edition = "2021"
max_width = 100
hard_tabs = false
tab_spaces = 4

# Imports
reorder_imports = true

# Formatting
newline_style = "Unix"
use_small_heuristics = "Default"

# Functions
fn_params_layout = "Tall"

# Arrays
array_width = 60
chain_width = 60
