name: CI/CD Pipeline

# Skip the whole pipeline when only non-code paths change (saves minutes on docs/README edits).
# If a commit touches any path NOT listed here, the workflow runs as usual.
on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "assets/**"
      - ".gitignore"
      - "LICENSE"
      - "LICENSE-*"
      - "architecture.puml"
      - ".editorconfig"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "assets/**"
      - ".gitignore"
      - "LICENSE"
      - "LICENSE-*"
      - "architecture.puml"
      - ".editorconfig"
  workflow_dispatch:
    inputs:
      profile_concurrency:
        description: "Concurrency for CPU profile run"
        required: false
        default: "128"
      profile_queries:
        description: "Total queries for CPU profile run"
        required: false
        default: "20000"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Tests run on Linux only (RustDB is not supported on Windows/macOS).
  test:
    name: Test Suite (${{ matrix.os }}, ${{ matrix.rust }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            features: ""
          - os: ubuntu-latest
            rust: beta
            features: ""
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      # Full run (lib + integration + doctests) on cold cache and beta may exceed 10 minutes.
      - name: Run tests
        run: cargo test --verbose ${{ matrix.features }}
        timeout-minutes: 25

      - name: Run integration tests
        run: cargo test --test integration_tests --verbose ${{ matrix.features }}
        timeout-minutes: 15

      - name: Run doc tests
        run: cargo test --doc --verbose ${{ matrix.features }}
        timeout-minutes: 10

      - name: Install cargo-audit
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        run: cargo install cargo-audit

      - name: Run cargo audit
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        run: cargo audit

      - name: Run cargo-deny
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # Coverage: cargo-llvm-cov → lcov.info → Codecov (see codecov.yml at repository root).
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      # Ignore coverage for large internal modules plus CLI/binaries (they're exercised via e2e smoke, not unit tests).
      COV_REGEX: '(executor[/\\]operators|analyzer[/\\]semantic_analyzer|analyzer[/\\]access_checker|analyzer[/\\]type_checker|analyzer[/\\]metadata_cache|core[/\\]recovery_manager|core[/\\]acid_manager|core[/\\]buffer|core[/\\]transaction|core[/\\]advanced_lock_manager|core[/\\]recovery\.rs|storage[/\\]page_manager|storage[/\\]schema_manager|storage[/\\]index[/\\]btree|storage[/\\]io_optimization|storage[/\\]block|storage[/\\]row|storage[/\\]tuple|storage[/\\]page\.rs|planner[/\\]planner|logging[/\\]compaction|logging[/\\]recovery|parser[/\\]parser)\.rs$|[/\\]src[/\\](cli|main)\.rs$|(^|[/\\])bin[/\\].*\.rs$'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rust stable + llvm-tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Generate LCOV first (without --fail-under-lines); otherwise Codecov upload is skipped if the threshold fails.
      - name: cargo llvm-cov (tests + lcov.info)
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex "$COV_REGEX"
          test -s lcov.info
          wc -l lcov.info

      # Only lcov.info; disable_search avoids the CLI picking up *_coverage_tests.rs via *coverage*.
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          disable_search: true
          fail_ci_if_error: true
          verbose: true

      - name: Enforce ≥85% lines (local threshold)
        run: |
          cargo llvm-cov report --fail-under-lines 85 \
            --ignore-filename-regex "$COV_REGEX"

  # After tests: code quality and MSRV (in parallel), then release build.
  format:
    name: Format Check
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Check
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust 1.90.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check MSRV
        run: cargo check

  # Checking the build in release mode
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [format, clippy, msrv, coverage]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release
        run: cargo build --release --verbose

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdb-linux-x64
          path: target/release/rustdb

  # Alongside the release build: same prerequisites (format, clippy, msrv), in parallel.
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [format, clippy, msrv, coverage]
    outputs:
      image: ${{ steps.set_image.outputs.image }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Choose image tag for downstream jobs
        id: set_image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Prefer the deterministic sha tag (<ref_name>-<sha>) when present.
          preferred="ghcr.io/${{ github.repository }}:${REF_NAME}-${SHA}"
          if echo "$TAGS" | tr -d '\r' | grep -Fxq "$preferred"; then
            image="$preferred"
          else
            # Fallback: first generated tag.
            image="$(echo "$TAGS" | head -n1 | tr -d '\r')"
          fi
          test -n "$image"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "Selected image: $image"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Pull the image just pushed by `docker` and run scripts/sql_stateful_smoke.sh (persistent volume SQL checks).
  docker_stateful_sql:
    name: Docker stateful SQL smoke
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          set -euo pipefail
          test -n "$IMAGE"
          echo "RUSTDB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE"

      - name: Run stateful SQL smoke
        run: |
          set -euo pipefail
          chmod +x scripts/sql_stateful_smoke.sh
          ./scripts/sql_stateful_smoke.sh
        timeout-minutes: 15

  # QUIC smoke: run server from the just-built image and send queries over QUIC from host client.
  docker_quic_sql:
    name: Docker QUIC SQL smoke
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust (client)
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          set -euo pipefail
          test -n "$IMAGE"
          echo "RUSTDB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE"

      - name: Run QUIC SQL smoke
        run: |
          set -euo pipefail
          chmod +x scripts/sql_quic_smoke.sh
          ./scripts/sql_quic_smoke.sh
        timeout-minutes: 15

  bench_sqlite_vs_rustdb:
    name: Benchmark SQLite vs RustDB (charts)
    runs-on: ubuntu-latest
    needs: [docker]
    # Benchmarks are relatively heavy; run on main pushes only.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust (load generator)
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 python3 python3-pip

      - name: Install Python deps (matplotlib)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install matplotlib "psycopg[binary]"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          set -euo pipefail
          test -n "$IMAGE"
          echo "RUSTDB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE"

      - name: Build rustdb_load (host)
        run: |
          set -euo pipefail
          cargo build -q --bin rustdb_load
          cargo build -q --bin rustdb_quic_client
          test -x ./target/debug/rustdb_quic_client || (echo "missing ./target/debug/rustdb_quic_client" && ls -la ./target/debug && exit 1)

      - name: Start RustDB server (docker)
        run: |
          set -euo pipefail
          name="rustdb-bench-server"
          vol="rustdb-bench-vol"
          rm -rf bench-out
          mkdir -p bench-out
          cat > bench-out/config.toml <<'EOF'
          name = "rustdb"
          data_directory = "./data"
          max_connections = 1000
          connection_timeout = 30
          query_timeout = 60
          language = "en"

          [network]
          host = "0.0.0.0"
          port = 5432
          max_connections = 1000
          EOF
          docker rm -f "$name" >/dev/null 2>&1 || true
          docker volume rm -f "$vol" >/dev/null 2>&1 || true
          docker volume create "$vol" >/dev/null
          docker run -d --name "$name" -p 15432:5432/udp \
            -v "$vol:/app/data" \
            -v "$PWD/bench-out/config.toml:/app/config/config.toml:ro" \
            "$RUSTDB_IMAGE" \
            sh -c "rustdb --config /app/config/config.toml server --host 0.0.0.0 --port 5432 --cert-out /tmp/server.der" >/dev/null
          for i in $(seq 1 80); do
            if docker exec "$name" sh -c "test -s /tmp/server.der" >/dev/null 2>&1; then
              break
            fi
            sleep 0.2
          done
          docker cp "$name:/tmp/server.der" bench-out/server.der
          test -s bench-out/server.der
          echo "RUSTDB_CERT=$PWD/bench-out/server.der" >> "$GITHUB_ENV"
          echo "RUSTDB_SERVER_CONTAINER=$name" >> "$GITHUB_ENV"
          echo "RUSTDB_SERVER_VOLUME=$vol" >> "$GITHUB_ENV"

      - name: Start PostgreSQL (docker)
        run: |
          set -euo pipefail
          name="postgres-bench"
          docker rm -f "$name" >/dev/null 2>&1 || true
          docker run -d --name "$name" -p 15440:5432 \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=postgres \
            postgres:16-alpine \
            -c max_connections=500 >/dev/null
          # Wait until Postgres is ready to accept connections.
          # During init it may report "rejecting connections" with non-zero exit code.
          ready=0
          for i in $(seq 1 240); do
            if docker exec "$name" pg_isready -U postgres >/dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 0.5
          done
          if [[ "$ready" -ne 1 ]]; then
            echo "ERROR: Postgres did not become ready in time"
            docker logs "$name" 2>&1 | tail -n 200 || true
            exit 1
          fi
          echo "POSTGRES_DSN=postgresql://postgres:postgres@127.0.0.1:15440/postgres" >> "$GITHUB_ENV"

      - name: Warmup (create table in RustDB)
        run: |
          set -euo pipefail
          cargo run -q --bin rustdb_quic_client -- --addr 127.0.0.1:15432 --cert "$RUSTDB_CERT" --server-name localhost "CREATE TABLE bench_t (a INTEGER)"
          cargo run -q --bin rustdb_quic_client -- --addr 127.0.0.1:15432 --cert "$RUSTDB_CERT" --server-name localhost "INSERT INTO bench_t (a) VALUES (1)"

      - name: Capture RustDB data directory snapshot
        run: |
          set -euo pipefail
          mkdir -p bench-out
          echo "==> rustdb info" > bench-out/rustdb_info.txt
          docker exec "$RUSTDB_SERVER_CONTAINER" sh -c "rustdb --config /app/config/config.toml info || true" >> bench-out/rustdb_info.txt 2>&1
          echo "" >> bench-out/rustdb_info.txt
          echo "==> /app/data listing" > bench-out/rustdb_data_snapshot.txt
          docker exec "$RUSTDB_SERVER_CONTAINER" sh -c "ls -la /app/data || true" >> bench-out/rustdb_data_snapshot.txt 2>&1
          echo "" >> bench-out/rustdb_data_snapshot.txt
          echo "==> /app/data usage" >> bench-out/rustdb_data_snapshot.txt
          docker exec "$RUSTDB_SERVER_CONTAINER" sh -c "du -sh /app/data || true; du -a /app/data 2>/dev/null | sort -n | tail -n 50 || true" >> bench-out/rustdb_data_snapshot.txt 2>&1

      - name: Run comparison + charts
        run: |
          set -euo pipefail
          python3 scripts/bench_sqlite_vs_rustdb.py \
            --out-dir bench-out \
            --cert "$RUSTDB_CERT" \
            --addr 127.0.0.1:15432 \
            --server-name localhost \
            --concurrency 1,8,32,128 \
            --queries 5000 \
            --rustdb-connection-modes shared,per-worker \
            --postgres-dsn "$POSTGRES_DSN"

      - name: Stop RustDB server (docker)
        if: always()
        run: |
          docker rm -f "$RUSTDB_SERVER_CONTAINER" >/dev/null 2>&1 || true
          docker volume rm -f "$RUSTDB_SERVER_VOLUME" >/dev/null 2>&1 || true

      - name: Stop PostgreSQL (docker)
        if: always()
        run: |
          docker rm -f postgres-bench >/dev/null 2>&1 || true

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-vs-rustdb-bench
          path: |
            bench-out/bench.md
            bench-out/bench.csv
            bench-out/bench.png
            bench-out/rustdb_info.txt
            bench-out/rustdb_data_snapshot.txt

  profile_quic_select_table:
    name: Trace profile (QUIC select_table @128)
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          set -euo pipefail
          test -n "$IMAGE"
          echo "RUSTDB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE"

      - name: Run trace profiling script
        env:
          CONCURRENCY: ${{ inputs.profile_concurrency }}
          QUERIES: ${{ inputs.profile_queries }}
          OUT_DIR: profile-out
        run: |
          set -euo pipefail
          chmod +x scripts/profile_quic_select_table_trace_ci.sh
          ./scripts/profile_quic_select_table_trace_ci.sh
        timeout-minutes: 20

      - name: Upload profiling artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trace-profile-quic-select-table
          path: |
            profile-out/load.jsonl
            profile-out/server.der
            profile-out/trace.json

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [format, clippy, msrv, coverage]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check documentation
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Deploy documentation to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          destination_dir: docs

  # Deploy to GitHub Releases (coverage and security run in the test job on ubuntu + stable).
  deploy:
    name: Deploy to GitHub Releases
    runs-on: ubuntu-latest
    needs: [build, docker, docker_stateful_sql, docker_quic_sql, bench_sqlite_vs_rustdb]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          tar -czf /tmp/source.tar.gz --exclude=target --exclude=.git .
          mv /tmp/source.tar.gz rustdb-main-${{ github.sha }}-source.tar.gz

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: rustdb-linux-x64
          path: linux

      - name: Create release archives
        run: |
          set -e
          mkdir -p release
          LINUX_BIN=$(find linux -name rustdb -type f 2>/dev/null | head -1)
          cp "$LINUX_BIN" release/rustdb
          tar -czf rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz -C release rustdb

      - name: Verify artifacts
        run: |
          test -f rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
          test -f rustdb-main-${{ github.sha }}-source.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.sha }}
          name: Build from main (${{ github.sha }})
          fail_on_unmatched_files: false
          body: |
            ## Artifacts
            - **Linux x86_64**: rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
            - **Source**: rustdb-main-${{ github.sha }}-source.tar.gz
            ## Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}:latest
            ```
          files: |
            rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
            rustdb-main-${{ github.sha }}-source.tar.gz
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Notifications
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Notify on success
        if: needs.deploy.result == 'success'
        run: echo "Deployment successful!"

      - name: Notify on failure
        if: needs.deploy.result == 'failure'
        run: echo "Deployment failed!"
