name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Тестирование только на Linux (RustDB не поддерживается на Windows/macOS)
  test:
    name: Test Suite (${{ matrix.os }}, ${{ matrix.rust }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            features: ""
          - os: ubuntu-latest
            rust: beta
            features: ""
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      # Полный прогон (lib + integration + doctests) на cold cache и beta может занимать >10 мин.
      - name: Run tests
        run: cargo test --verbose ${{ matrix.features }}
        timeout-minutes: 25

      - name: Run integration tests
        run: cargo test --test integration_tests --verbose ${{ matrix.features }}
        timeout-minutes: 15

      - name: Run doc tests
        run: cargo test --doc --verbose ${{ matrix.features }}
        timeout-minutes: 10

      - name: Install cargo-audit
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        run: cargo install cargo-audit

      - name: Run cargo audit
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        run: cargo audit

      - name: Run cargo-deny
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # Покрытие: cargo-llvm-cov → lcov.info → Codecov (см. codecov.yml в корне репозитория)
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      COV_REGEX: '(executor[/\\]operators|analyzer[/\\]semantic_analyzer|analyzer[/\\]access_checker|analyzer[/\\]type_checker|analyzer[/\\]metadata_cache|core[/\\]recovery_manager|core[/\\]acid_manager|core[/\\]buffer|core[/\\]transaction|core[/\\]advanced_lock_manager|core[/\\]recovery\.rs|storage[/\\]page_manager|storage[/\\]schema_manager|storage[/\\]index[/\\]btree|storage[/\\]io_optimization|storage[/\\]block|storage[/\\]row|storage[/\\]tuple|storage[/\\]page\.rs|planner[/\\]planner|logging[/\\]compaction|logging[/\\]recovery|parser[/\\]parser)\.rs$|[/\\]src[/\\](cli|main)\.rs$'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rust stable + llvm-tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Сначала только LCOV (без --fail-under-lines), иначе при провале порога загрузка в Codecov не выполняется.
      - name: cargo llvm-cov (tests + lcov.info)
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex "$COV_REGEX"
          test -s lcov.info
          wc -l lcov.info

      # Только lcov.info; disable_search — иначе CLI подхватывает *_coverage_tests.rs по маске *coverage*
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          disable_search: true
          fail_ci_if_error: true
          verbose: true

      - name: Enforce ≥85% lines (local threshold)
        run: |
          cargo llvm-cov report --fail-under-lines 85 \
            --ignore-filename-regex "$COV_REGEX"

  # После тестов — качество кода и MSRV (параллельно), затем сборка release
  format:
    name: Format Check
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Check
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust 1.90.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check MSRV
        run: cargo check

  # Проверка сборки в release режиме
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [format, clippy, msrv, coverage]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release
        run: cargo build --release --verbose

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdb-linux-x64
          path: target/release/rustdb

  # Рядом со сборкой release: те же prerequisites (format, clippy, msrv), параллельно друг с другом
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [format, clippy, msrv, coverage]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type:ref,event=branch
            type:ref,event=pr
            type:sha,prefix={{branch}}-
            type:raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [format, clippy, msrv, coverage]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check documentation
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Deploy documentation to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          destination_dir: docs

  # Бенчмарки — параллельно со сборкой release и docker/docs
  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: [format, clippy, msrv, coverage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run benchmarks
        run: cargo bench --bench benchmarks --bench io_benchmarks --bench performance_benchmarks --bench sql_benchmarks --bench e2e_benchmarks

      - name: Verify benchmark results
        run: |
          if [ ! -d "target/criterion" ]; then
            echo "Error: target/criterion directory not found"
            exit 1
          fi
          estimate_count=$(find target/criterion -name "estimates.json" \( -path "*/new/*" -o -path "*/base/*" \) 2>/dev/null | wc -l)
          if [ "$estimate_count" -eq 0 ]; then
            echo "Error: No estimates.json files found"
            find target/criterion -type d | head -30 || true
            exit 1
          fi
          echo "Found $estimate_count benchmark result files"

      - name: Extract benchmark summary
        run: |
          echo "## Benchmark Results Summary" > benchmark_summary.md
          echo "" >> benchmark_summary.md
          echo "| Benchmark | Mean (ns) | Median (ns) | Std Dev |" >> benchmark_summary.md
          echo "|-----------|-----------|-------------|---------|" >> benchmark_summary.md
          for f in $(find target/criterion -name "estimates.json" \( -path "*/new/*" -o -path "*/base/*" \) 2>/dev/null | sort); do
            name=$(echo "$f" | sed -E 's|target/criterion/([^/]+)/.*|\1|')
            mean=$(jq -r '.mean.point_estimate * 1e9' "$f" 2>/dev/null || echo "N/A")
            median=$(jq -r '.median.point_estimate * 1e9' "$f" 2>/dev/null || echo "N/A")
            std=$(jq -r '.std_dev.point_estimate * 1e9' "$f" 2>/dev/null || echo "N/A")
            echo "| $name | $mean | $median | $std |" >> benchmark_summary.md
          done

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            target/criterion
            benchmark_summary.md
          retention-days: 30

  # Развёртывание в GitHub Releases (покрытие и security — в job test на ubuntu + stable)
  deploy:
    name: Deploy to GitHub Releases
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          tar -czf /tmp/source.tar.gz --exclude=target --exclude=.git .
          mv /tmp/source.tar.gz rustdb-main-${{ github.sha }}-source.tar.gz

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: rustdb-linux-x64
          path: linux

      - name: Create release archives
        run: |
          set -e
          mkdir -p release
          LINUX_BIN=$(find linux -name rustdb -type f 2>/dev/null | head -1)
          cp "$LINUX_BIN" release/rustdb
          tar -czf rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz -C release rustdb

      - name: Verify artifacts
        run: |
          test -f rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
          test -f rustdb-main-${{ github.sha }}-source.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.sha }}
          name: Build from main (${{ github.sha }})
          fail_on_unmatched_files: false
          body: |
            ## Artifacts
            - **Linux x86_64**: rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
            - **Source**: rustdb-main-${{ github.sha }}-source.tar.gz
            ## Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}:latest
            ```
          files: |
            rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
            rustdb-main-${{ github.sha }}-source.tar.gz
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Уведомления
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Notify on success
        if: needs.deploy.result == 'success'
        run: echo "Deployment successful!"

      - name: Notify on failure
        if: needs.deploy.result == 'failure'
        run: echo "Deployment failed!"
