name: CI/CD Pipeline

# Skip the whole pipeline when only non-code paths change (saves minutes on docs/README edits).
# If a commit touches any path NOT listed here, the workflow runs as usual.
# Note: do not list `.gitignore` here — a commit that only edits `.gitignore` must still trigger CI,
# otherwise pushes look like “CI stopped working” with no failed run (workflow skipped entirely).
on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
      - "LICENSE-*"
      - "architecture.puml"
      - ".editorconfig"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
      - "LICENSE-*"
      - "architecture.puml"
      - ".editorconfig"
  workflow_dispatch:
    inputs:
      profile_concurrency:
        description: "Concurrency for trace profile and Flame Graph (rustdb_load)"
        required: false
        default: "128"
      profile_queries:
        description: "Total queries for trace profile and Flame Graph (rustdb_load)"
        required: false
        default: "20000"
      loom_max_preemptions:
        description: "Loom LOOM_MAX_PREEMPTIONS for permutation tests (see tokio-rs/loom)"
        required: false
        default: "4"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Tests run on Linux only (RustDB is not supported on Windows/macOS).
  test:
    name: Test Suite (${{ matrix.os }}, ${{ matrix.rust }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            features: ""
          - os: ubuntu-latest
            rust: beta
            features: ""
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      # Full run (lib + integration + doctests) on cold cache and beta may exceed 10 minutes.
      - name: Run tests
        run: cargo test --verbose ${{ matrix.features }}
        timeout-minutes: 25

      - name: Run integration tests
        run: cargo test --test integration_tests --verbose ${{ matrix.features }}
        timeout-minutes: 15

      - name: Run doc tests
        run: cargo test --doc --verbose ${{ matrix.features }}
        timeout-minutes: 10

      - name: Install cargo-audit
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        run: cargo install cargo-audit

      - name: Run cargo audit
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        run: cargo audit

      - name: Run cargo-deny
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # Coverage: cargo-llvm-cov → lcov.info → Codecov (see codecov.yml at repository root).
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      # Ignore coverage for large internal modules plus CLI/binaries (they're exercised via e2e smoke, not unit tests).
      COV_REGEX: '(executor[/\\]operators|analyzer[/\\]semantic_analyzer|analyzer[/\\]access_checker|analyzer[/\\]type_checker|analyzer[/\\]metadata_cache|core[/\\]recovery_manager|core[/\\]acid_manager|core[/\\]buffer|core[/\\]transaction|core[/\\]advanced_lock_manager|core[/\\]recovery\.rs|storage[/\\]page_manager|storage[/\\]schema_manager|storage[/\\]index[/\\]btree|storage[/\\]io_optimization|storage[/\\]block|storage[/\\]row|storage[/\\]tuple|storage[/\\]page\.rs|planner[/\\]planner|logging[/\\]compaction|logging[/\\]recovery|parser[/\\]parser)\.rs$|[/\\]src[/\\](cli|main)\.rs$|(^|[/\\])bin[/\\].*\.rs$|[/\\]network[/\\]sql_commit_log\.rs$|[/\\]network[/\\]sql_engine_wal\.rs$|[/\\]network[/\\]sql_engine[/\\][^/\\]+\.rs$|[/\\]sql_session\.rs$|[/\\]catalog[/\\]schema\.rs$'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rust stable + llvm-tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Generate LCOV first (without --fail-under-lines); otherwise Codecov upload is skipped if the threshold fails.
      - name: cargo llvm-cov (tests + lcov.info)
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex "$COV_REGEX"
          test -s lcov.info
          wc -l lcov.info

      # Only lcov.info; disable_search avoids the CLI picking up *_coverage_tests.rs via *coverage*.
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          disable_search: true
          fail_ci_if_error: true
          verbose: true

      - name: Enforce ≥85% lines (local threshold)
        run: |
          cargo llvm-cov report --fail-under-lines 85 \
            --ignore-filename-regex "$COV_REGEX"

  # After tests: code quality and MSRV (in parallel), then release build.
  format:
    name: Format Check
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Check
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust 1.90.0 (MSRV)
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check MSRV
        run: cargo check

  # Checking the build in release mode
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [format, clippy, msrv, coverage]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release
        run: cargo build --release --verbose

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdb-linux-x64
          path: target/release/rustdb

  # Alongside the release build: same prerequisites (format, clippy, msrv), in parallel.
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [format, clippy, msrv, coverage]
    outputs:
      image: ${{ steps.set_image.outputs.image }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            # Short digest tag (valid even when `branch` is empty on some PR/fork flows; avoid `prefix={{branch}}-` → leading `-`).
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Choose image tag for downstream jobs
        id: set_image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # docker/metadata-action does not emit `${ref}-${full_40_char_sha}` by default; `type=sha`
          # yields `sha-<short>`. Match that first, then legacy `ref-fullsha` if ever present.
          repo="ghcr.io/${{ github.repository }}"
          short_sha=$(printf '%s' "$SHA" | cut -c1-7)
          preferred_digest="${repo}:sha-${short_sha}"
          preferred_ref_fullsha="${repo}:${REF_NAME}-${SHA}"
          image=""
          if echo "$TAGS" | tr -d '\r' | grep -Fxq "$preferred_digest"; then
            image="$preferred_digest"
          elif echo "$TAGS" | tr -d '\r' | grep -Fxq "$preferred_ref_fullsha"; then
            image="$preferred_ref_fullsha"
          else
            # PR pipelines: prefer stable `pr-<n>` if metadata produced it.
            image=$(echo "$TAGS" | tr -d '\r' | grep -E ":pr-[0-9]+\$" | head -n1 || true)
            if [ -z "${image:-}" ]; then
              image="$(echo "$TAGS" | head -n1 | tr -d '\r')"
            fi
          fi
          test -n "$image"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "Selected image: $image"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Pull the image just pushed by `docker` and run scripts/sql_stateful_smoke.sh (persistent volume SQL checks).
  docker_stateful_sql:
    name: Docker stateful SQL smoke
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          set -euo pipefail
          test -n "$IMAGE"
          echo "RUSTDB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE"

      - name: Run stateful SQL smoke
        run: |
          set -euo pipefail
          chmod +x scripts/sql_stateful_smoke.sh
          ./scripts/sql_stateful_smoke.sh
        timeout-minutes: 15

  # QUIC smoke: run server from the just-built image and send queries over QUIC from host client.
  docker_quic_sql:
    name: Docker QUIC SQL smoke
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust (client)
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          set -euo pipefail
          test -n "$IMAGE"
          echo "RUSTDB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE"

      - name: Run QUIC SQL smoke
        run: |
          set -euo pipefail
          chmod +x scripts/sql_quic_smoke.sh
          ./scripts/sql_quic_smoke.sh
        timeout-minutes: 15

  # NOTE: bench_sqlite_vs_rustdb job removed (cross-engine charts were not actionable / too flaky for CI).

  # Loom permutation tests for concurrent SqlEngine scenarios (see README + tokio-rs/loom).
  # Replaces the former RustDB vs Postgres throughput saturation benchmark job.
  test_loom_sql_engine:
    name: Loom (concurrent SQL engine)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps (TLS / native deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Run Loom permutation tests
        env:
          RUSTFLAGS: --cfg rustdb_loom
          LOOM_MAX_PREEMPTIONS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.loom_max_preemptions || '4' }}
        run: |
          set -euo pipefail
          mkdir -p loom-out
          cargo test --release --verbose \
            engine_concurrent_inserts_only_one_wins_same_pk \
            2>&1 | tee -a loom-out/loom-tests.log
          cargo test --release --verbose \
            engine_alter_fk_many_inserts_under_contention \
            2>&1 | tee -a loom-out/loom-tests.log

      - name: Upload Loom test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loom-sql-engine-tests
          path: loom-out/loom-tests.log

  # Throughput benchmarks split into parallel RustDB + PostgreSQL jobs + aggregate report.
  bench-rustdb-tpcc:
    name: Bench RustDB TPC-C (rustdb_tpcc)
    runs-on: ubuntu-latest
    needs: [docker]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    env:
      OUT_DIR: tpcc-out
      CONCURRENCY: 64
      DURATION_SECS: 300
      WARMUP_SECS: 10
      WAREHOUSES: 4
      ITEMS: 1000
      CUSTOMERS_PER_DISTRICT: 100

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust (load generator)
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull RustDB image
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          set -euo pipefail
          test -n "$IMAGE"
          echo "RUSTDB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE"

      - name: Run rustdb_tpcc benchmark
        run: |
          set -euo pipefail
          chmod +x scripts/bench_rustdb_tpcc.sh
          ./scripts/bench_rustdb_tpcc.sh

      - name: Upload RustDB TPC-C artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-rustdb-tpcc-result
          path: tpcc-out/

  bench-postgres-pgbench:
    name: Bench PostgreSQL (pgbench baseline)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      OUT_DIR: tpcc-out
      PGBENCH_SCALE: 10
      PGBENCH_CLIENTS: 64
      PGBENCH_JOBS: 16
      PGBENCH_DURATION: 300

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run pgbench baseline
        run: |
          set -euo pipefail
          chmod +x scripts/bench_postgres_pgbench.sh
          ./scripts/bench_postgres_pgbench.sh

      - name: Upload pgbench artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-postgres-pgbench-result
          path: tpcc-out/

  bench-report:
    name: Bench report (RustDB vs PostgreSQL)
    runs-on: ubuntu-latest
    needs: [bench-rustdb-tpcc, bench-postgres-pgbench]
    if: always()
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download RustDB benchmark artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: bench-rustdb-tpcc-result
          path: bench-input/rustdb

      - name: Download PostgreSQL benchmark artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: bench-postgres-pgbench-result
          path: bench-input/postgres

      - name: Render consolidated report
        run: |
          set -euo pipefail
          mkdir -p bench-out
          chmod +x scripts/bench_report_ci.py
          python3 scripts/bench_report_ci.py bench-input/rustdb bench-input/postgres bench-out | tee bench-out/summary_fragment.md

      - name: Append summary to GitHub Step Summary
        if: always()
        run: |
          set -euo pipefail
          if [[ -s bench-out/report.md ]]; then
            cat bench-out/report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Bench report" >> "$GITHUB_STEP_SUMMARY"
            echo "(report.md missing — both benchmark jobs may have failed)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload consolidated bench-report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-report
          path: bench-out/

  profile_quic_select_table:
    name: Trace profile (QUIC select_table @128)
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        env:
          IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          set -euo pipefail
          test -n "$IMAGE"
          echo "RUSTDB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE"

      - name: Run trace profiling script
        env:
          CONCURRENCY: ${{ inputs.profile_concurrency }}
          QUERIES: ${{ inputs.profile_queries }}
          OUT_DIR: profile-out
        run: |
          set -euo pipefail
          chmod +x scripts/profile_quic_select_table_trace_ci.sh
          ./scripts/profile_quic_select_table_trace_ci.sh
        timeout-minutes: 20

      - name: Upload profiling artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trace-profile-quic-select-table
          path: |
            profile-out/load.jsonl
            profile-out/server.der
            profile-out/trace.json

  flame_graph:
    name: Flame Graph (rustdb_load)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install perf (Linux)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y linux-tools-common linux-tools-generic
          KERNEL="$(uname -r)"
          if ! command -v perf >/dev/null 2>&1; then
            if [[ -x "/usr/lib/linux-tools/${KERNEL}/perf" ]]; then
              sudo ln -sf "/usr/lib/linux-tools/${KERNEL}/perf" /usr/local/bin/perf
            fi
          fi
          perf --version

      - name: Allow perf for runner user
        run: |
          set -euo pipefail
          echo -1 | sudo tee /proc/sys/kernel/perf_event_paranoid

      - name: Install cargo-flamegraph
        run: cargo install flamegraph

      - name: Generate flame graph (local server + rustdb_load)
        env:
          CARGO_PROFILE_RELEASE_DEBUG: "true"
          CONCURRENCY: ${{ github.event.inputs.profile_concurrency }}
          QUERIES: ${{ github.event.inputs.profile_queries }}
        run: |
          set -euo pipefail
          export CONCURRENCY="${CONCURRENCY:-128}"
          export QUERIES="${QUERIES:-20000}"
          chmod +x scripts/flamegraph_selfcontained.sh
          ./scripts/flamegraph_selfcontained.sh
        timeout-minutes: 25

      - name: Upload flame graph
        uses: actions/upload-artifact@v4
        with:
          name: flamegraph-rustdb-load
          path: |
            profile-out/flame_rustdb_load_select1.svg

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [format, clippy, msrv, coverage]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check documentation
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Deploy documentation to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          destination_dir: docs

  # Deploy to GitHub Releases (coverage and security run in the test job on ubuntu + stable).
  deploy:
    name: Deploy to GitHub Releases
    runs-on: ubuntu-latest
    needs: [build, docker, docker_stateful_sql, docker_quic_sql]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          tar -czf /tmp/source.tar.gz --exclude=target --exclude=.git .
          mv /tmp/source.tar.gz rustdb-main-${{ github.sha }}-source.tar.gz

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: rustdb-linux-x64
          path: linux

      - name: Create release archives
        run: |
          set -e
          mkdir -p release
          LINUX_BIN=$(find linux -name rustdb -type f 2>/dev/null | head -1)
          cp "$LINUX_BIN" release/rustdb
          tar -czf rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz -C release rustdb

      - name: Verify artifacts
        run: |
          test -f rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
          test -f rustdb-main-${{ github.sha }}-source.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: main-${{ github.sha }}
          name: Build from main (${{ github.sha }})
          fail_on_unmatched_files: false
          body: |
            ## Artifacts
            - **Linux x86_64**: rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
            - **Source**: rustdb-main-${{ github.sha }}-source.tar.gz
            ## Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}:latest
            ```
          files: |
            rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
            rustdb-main-${{ github.sha }}-source.tar.gz
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Notifications
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Notify on success
        if: needs.deploy.result == 'success'
        run: echo "Deployment successful!"

      - name: Notify on failure
        if: needs.deploy.result == 'failure'
        run: echo "Deployment failed!"
