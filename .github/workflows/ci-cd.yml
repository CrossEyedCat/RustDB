name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Тестирование
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta, nightly]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}

    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev pkg-config

    - name: Run tests
      run: cargo test --verbose

    - name: Run integration tests
      run: cargo test --test integration_tests --verbose

    - name: Run clippy
      if: matrix.rust == 'stable'
      run: cargo clippy -- -D warnings

    - name: Run fmt check
      if: matrix.rust == 'stable'
      run: cargo fmt -- --check

  # Сборка
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev pkg-config

    - name: Build release
      run: cargo build --release

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rustdb-linux
        path: target/release/rustdb

  # Сборка для Windows
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: target
        key: windows-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Build release
      run: cargo build --release

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rustdb-windows
        path: target/release/rustdb.exe

  # Docker сборка
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Безопасность
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run security audit
      run: cargo audit

    - name: Run cargo-deny
      uses: EmbarkStudios/cargo-deny-action@v2
      with:
        command: check

  # Развертывание в GitHub Releases
  deploy:
    name: Deploy to GitHub Releases
    runs-on: ubuntu-latest
    needs: [build, build-windows, docker, security]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create source archive
      run: |
        tar -czf /tmp/source.tar.gz --exclude=target --exclude=.git .
        mv /tmp/source.tar.gz rustdb-main-${{ github.sha }}-source.tar.gz

    - name: Download Linux build
      uses: actions/download-artifact@v4
      with:
        name: rustdb-linux
        path: linux

    - name: Download Windows build
      uses: actions/download-artifact@v4
      with:
        name: rustdb-windows
        path: windows

    - name: Create release archives
      run: |
        set -e
        mkdir -p release
        LINUX_BIN=$(find linux -name rustdb -type f 2>/dev/null | head -1)
        cp "$LINUX_BIN" release/rustdb
        tar -czf rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz -C release rustdb
        WIN_EXE=$(find windows -name "rustdb.exe" -type f 2>/dev/null | head -1)
        zip -j rustdb-main-${{ github.sha }}-windows-x86_64.zip "$WIN_EXE"

    - name: Verify artifacts
      run: |
        ls -la rustdb-main-*.tar.gz rustdb-main-*.zip 2>/dev/null || true
        test -f rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
        test -f rustdb-main-${{ github.sha }}-windows-x86_64.zip
        test -f rustdb-main-${{ github.sha }}-source.tar.gz

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: main-${{ github.sha }}
        name: Build from main (${{ github.sha }})
        fail_on_unmatched_files: false
        body: |
          ## Artifacts
          - **Linux x86_64**: rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
          - **Windows x86_64**: rustdb-main-${{ github.sha }}-windows-x86_64.zip
          - **Source**: rustdb-main-${{ github.sha }}-source.tar.gz
          ## Docker
          ```bash
          docker pull ghcr.io/crosseyedcat/rustdb:latest
          ```
        files: |
          rustdb-main-${{ github.sha }}-linux-x86_64.tar.gz
          rustdb-main-${{ github.sha }}-windows-x86_64.zip
          rustdb-main-${{ github.sha }}-source.tar.gz
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Уведомления
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    
    steps:
    - name: Notify on success
      if: needs.deploy.result == 'success'
      run: |
        echo "Deployment successful!"
        # Здесь можно добавить уведомления в Slack, Discord и т.д.

    - name: Notify on failure
      if: needs.deploy.result == 'failure'
      run: |
        echo "Deployment failed!"
        # Здесь можно добавить уведомления об ошибках

