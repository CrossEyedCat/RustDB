# cargo-deny configuration for RustDB
# https://embarkstudios.github.io/cargo-deny/
#
# NOTE: License checks (licenses) do not perform vulnerability scanning.
# Vulnerabilities are checked separately: advisories (cargo-deny) + cargo-audit.

[advisories]
# Vulnerability checks using the RustSec Advisory Database.
ignore = [
    # RUSTSEC-2025-0141: bincode unmaintained (not a CVE — upstream maintenance ended).
    # This project uses bincode-next + legacy(); original crates.io bincode 1.x is unmaintained (RUSTSEC).
    "RUSTSEC-2025-0141",
]

[licenses]
# Allowed licenses (SPDX 3.11). Permissive only; no copyleft.
allow = [
    "MIT",                          # ~40% crates.io
    "Apache-2.0",                   # ~25% crates.io
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",             # unicode/icu crates
    "Unicode-3.0",                 # unicode-ident: (MIT OR Apache-2.0) AND Unicode-3.0
    "BSL-1.0",                      # Boost Software License
    "CC0-1.0",                      # Public domain
    "Unlicense",                    # Public domain
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
